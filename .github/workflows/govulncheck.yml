name: govulncheck
on:
  push:
  pull_request:
  schedule: # weekly on Friday morning so if there is a need we can fix in the weekend
    - cron: "14 3 * * 5"
  workflow_dispatch:

permissions:
  contents: read
jobs:
  govulncheck:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: |
          go run golang.org/x/vuln/cmd/govulncheck@latest ./...